
services:
  postgres:
    image: postgres:16
    container_name: mypos-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mypos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: mypos-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mypos

  frontend:
    build: ./frontend
    container_name: mypos-frontend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data: